services:
  # ── FastAPI RAG ──────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aira-rag
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_HOST=http://host.docker.internal:11434 # Ollama en Windows/host via Docker Desktop
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      - VAULT_PATH=/vault
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ${VAULT_PATH}:/vault # Obsidian vault
      - chroma_data:/app/chroma # Vector DB
      - pdf_inbox:/app/data/documents # PDFs
      - hf_cache:/root/.cache/huggingface # Cache embeddings
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aira-net

  # ── OpenClaw gateway (agent + Telegram) ─────────────────────
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: aira-openclaw
    user: root
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      - OLLAMA_API_KEY=ollama-local
    volumes:
      - ${VAULT_PATH}:/vault
      - ./config/openclaw.json:/tmp/openclaw.json
      - ./config/skills:/tmp/skills
      - ./config/skills:/root/.openclaw/skills
      - ./config/agent:/tmp/agent
      - openclaw_config:/root/.openclaw
      - ./config/workspace:/tmp/workspace
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "cp /tmp/openclaw.json /root/.openclaw/openclaw.json; cp -r /tmp/skills/. /root/.openclaw/skills/ 2>/dev/null || true; cp -r /tmp/agent/. /root/.openclaw/agents/main/agent/ 2>/dev/null || true; cp -r /tmp/workspace/. /root/.openclaw/workspace/ 2>/dev/null || true; node dist/index.js gateway",
      ]
    depends_on:
      - fastapi
    networks:
      - aira-net

  # ── OpenClaw CLI (for manual commands) ────────────────────
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: aira-openclaw-cli
    profiles: ["cli"]
    volumes:
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json
      - ./config/skills:/home/node/.openclaw/skills
      - openclaw_config:/home/node/.openclaw
    networks:
      - aira-net
    entrypoint: ["node", "dist/index.js"]

  searxng:
    image: searxng/searxng:latest
    container_name: aira-searxng
    restart: unless-stopped
    volumes:
      - ./config/searxng:/etc/searxng:rw
    networks:
      - aira-net

# ── Volumes ──────────────────────────────────────────────────
volumes:
  chroma_data:
  pdf_inbox:
  hf_cache:
  openclaw_config:

# ── Internal nerwork ────────────────────────────────────────────────
networks:
  aira-net:
    driver: bridge
